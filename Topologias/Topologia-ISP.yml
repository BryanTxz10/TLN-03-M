name: ISP-TDP-CLARO-IOL

topology:
  nodes:

    #########################################
    #    Head Quarter (Oficina Principal)
    #########################################

    CPE-HQ:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/CPE_HQ_cfg.partial

    CPE-HQ-BK:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/CPE_HQ_BK_cfg.partial

    SW-PISO1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-17.12.1
      type: l2
      startup-config: configs/SW-PISO1_cfg.partial

    SW-PISO2:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-17.12.1
      type: l2
      startup-config: configs/SW-PISO2_cfg.partial

    PC1-VLAN10:
      kind: linux
      image: alpine:3.23
      exec:
        - ip add add 192.168.10.10/24 dev eth1
        - ip route replace default via 192.168.10.1 dev eth1

    PC2-VLAN10:
      kind: linux
      image: alpine:3.23
      exec:
        - ip add add 192.168.10.20/24 dev eth1
        - ip route replace default via 192.168.10.1 dev eth1

    PC3-VLAN20:
      kind: linux
      image: alpine:3.23
      exec:
        - ip add add 192.168.20.10/24 dev eth1
        - ip route replace default via 192.168.20.1 dev eth1

    PC4-VLAN20:
      kind: linux
      image: alpine:3.23
      exec:
          - ip add add 192.168.20.20/24 dev eth1
          - ip route replace default via 192.168.20.1 dev eth1

    #########################################
    #    Movistar (AS 100)
    #########################################
    M1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/M1_cfg.partial

    M2:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/M2_cfg.partial

    M3:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/M3_cfg.partial

    M4:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/M4_cfg.partial

    #########################################
    #    Branch Office (Oficina Remota)
    #########################################
    CPE-BRANCH:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/CPE_BRANCH_cfg.partial
    
    CPE-BRANCH-BK:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/CPE_BRANCH_BK_cfg.partial

    SW-R-PISO1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-17.12.1
