      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/LU1_cfg.partial

    LU2:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/LU2_cfg.partial

    LU3:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/LU3_cfg.partial

    #########################################
    #    Google (AS 1000)
    #########################################
    GOOGLE:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/GOOGLE_cfg.partial
  
  links:
    #########################################
    # Enlaces de Google
    #########################################
    - endpoints: [ "GOOGLE:e0/1", "T3:e0/1" ]
    - endpoints: [ "GOOGLE:e0/2", "ATT3:e0/1" ]
    - endpoints: [ "GOOGLE:e0/3", "OR3:e0/1" ]
    - endpoints: [ "GOOGLE:e1/0", "LU3:e0/1" ]
    
    #########################################
    # Enlaces en Telxius
    #########################################
    - endpoints: [ "T1:e0/2", "T2:e0/1" ]
    - endpoints: [ "T2:e0/2", "T3:e0/2" ]

    #########################################
    # Enlaces en ATT
    #########################################
    - endpoints: [ "ATT1:e0/2", "ATT2:e0/1" ]
    - endpoints: [ "ATT2:e0/2", "ATT3:e0/2" ]

    #########################################
    # Enlaces en Orange
    #########################################
    - endpoints: [ "OR1:e0/2", "OR2:e0/1" ]
    - endpoints: [ "OR2:e0/2", "OR3:e0/2" ]

    #########################################
    # Enlaces en Lumen
    #########################################
    - endpoints: [ "LU1:e0/2", "LU2:e0/1" ]
    - endpoints: [ "LU2:e0/2", "LU3:e0/2" ]

    #########################################
    # Enlaces dentro del ISP Movistar
    #########################################
    - endpoints: [ "M1:e1/0", "CPE-HQ:e0/1" ]
    - endpoints: [ "M1:e0/1", "M2:e0/1" ]
    - endpoints: [ "M1:e0/2", "M3:e0/1" ]
    - endpoints: [ "M1:e0/3", "M4:e0/1" ]
    - endpoints: [ "M2:e0/2", "M4:e0/2" ]
    - endpoints: [ "M3:e0/2", "M4:e0/3" ]
    - endpoints: [ "M3:e0/3", "CPE-BRANCH-BK:e0/1" ]
    - endpoints: [ "M3:e1/0", "CPE-BRANCH2:e0/1" ]

    #########################################
    # Enlaces dentro del ISP Movistar con Telxius
    #########################################
    - endpoints: [ "M2:e0/3", "T1:e0/1" ]
    
    #########################################
    # Enlaces dentro del ISP Movistar con ATT
    #########################################
    - endpoints: [ "M2:e1/1", "ATT1:e0/1" ]

    #########################################
    #
    # Enlaces dentro del ISP Claro
    #
    #########################################
    - endpoints: [ "C1:e1/0", "CPE-BRANCH:e0/1" ]
    - endpoints: [ "C2:e0/1", "C3:e0/1" ]
    - endpoints: [ "C2:e0/2", "C4:e0/1" ]
    - endpoints: [ "C2:e1/0", "C1:e0/1" ]
    - endpoints: [ "C3:e0/2", "M4:e1/0" ]
    - endpoints: [ "C4:e0/2", "M4:e1/1" ]
    - endpoints: [ "C5:e0/2", "C4:e0/3" ]
    - endpoints: [ "C5:e0/3", "C3:e0/3" ]
    - endpoints: [ "C5:e0/1", "C2:e0/3" ]
    - endpoints: [ "C5:e1/0", "C1:e0/2" ]
    - endpoints: [ "C5:e1/1", "CPE-HQ-BK:e0/1" ]
    - endpoints: [ "C5:e1/2", "CPE-BRANCH2-BK:e0/1" ]

    #########################################
    # Enlaces dentro del ISP Claro con Orange
    #########################################
    - endpoints: [ "C2:e1/1", "OR1:e0/1" ]
    
    #########################################
    # Enlaces dentro del ISP Claro con Lumen
    #########################################
    - endpoints: [ "C2:e1/3", "LU1:e0/1" ]

    #########################################
    # Enlaces dentro del Head Quarter
    #########################################
    - endpoints: [ "CPE-HQ:e0/2", "SW-PISO1:e0/1" ]
    - endpoints: [ "CPE-HQ-BK:e0/2", "SW-PISO1:e1/1" ]
    - endpoints: [ "SW-PISO1:e0/2", "SW-PISO2:e0/1" ]
    - endpoints: [ "SW-PISO1:e0/3", "PC1-VLAN10:eth1" ]
    - endpoints: [ "SW-PISO1:e1/0", "PC2-VLAN10:eth1" ]
    - endpoints: [ "SW-PISO2:e0/2", "PC3-VLAN20:eth1" ]
    - endpoints: [ "SW-PISO2:e0/3", "PC4-VLAN20:eth1" ]

    #########################################
    # Enlaces dentro del Branch Office
    #########################################
    - endpoints: [ "CPE-BRANCH:e0/2", "SW-R-PISO1:e0/1" ]
    - endpoints: [ "CPE-BRANCH-BK:e0/2", "SW-R-PISO1:e1/1" ]
    - endpoints: [ "SW-R-PISO1:e0/2", "SW-R-PISO2:e0/1" ]
    - endpoints: [ "SW-R-PISO1:e0/3", "PC1-R-VLAN5:eth1" ]
    - endpoints: [ "SW-R-PISO1:e1/0", "PC2-R-VLAN5:eth1" ]
    - endpoints: [ "SW-R-PISO2:e0/2", "PC3-R-VLAN15:eth1" ]
    - endpoints: [ "SW-R-PISO2:e0/3", "PC4-R-VLAN15:eth1" ]

    #########################################
    # Enlaces dentro del Branch Office 2
    #########################################
    - endpoints: [ "CPE-BRANCH2:e0/2", "SW-R2-PISO1:e0/1" ]
    - endpoints: [ "CPE-BRANCH2-BK:e0/2", "SW-R2-PISO1:e0/2" ]
    - endpoints: [ "SW-R2-PISO1:e0/3", "PC1-R-VLAN25:eth1" ]
    - endpoints: [ "SW-R2-PISO1:e1/1", "PC2-R-VLAN25:eth1" ]
    - endpoints: [ "SW-R2-PISO1:e1/2", "PC3-R-VLAN30:eth1" ]
    - endpoints: [ "SW-R2-PISO1:e1/3", "PC4-R-VLAN30:eth1" ]
