      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/C2_cfg.partial

    C3:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/C3_cfg.partial

