    PC2-R-VLAN5:
      kind: linux
      image: alpine:3.23
      exec:
        - ip add add 192.168.5.20/24 dev eth1
        - ip route replace default via 192.168.5.1 dev eth1

    PC3-R-VLAN15:
      kind: linux
      image: alpine:3.23
      exec:
        - ip add add 192.168.15.10/24 dev eth1
        - ip route replace default via 192.168.15.1 dev eth1

    PC4-R-VLAN15:
